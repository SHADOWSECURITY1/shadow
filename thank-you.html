<title>Received — SHADOW</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --black: #080808; --red: #C9A84C; --white: #f0ede8; --gray: #888888; --border: #1e1e1e; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
  body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
  .cursor { position: fixed; top: 0; left: 0; width: 6px; height: 6px; background: #ff1a1a; border-radius: 50%; pointer-events: none; z-index: 2147483647; will-change: transform; transform: translate(-200px,-200px); box-shadow: 0 0 3px 1px #ff1a1a, 0 0 8px 3px rgba(255,26,26,0.7), 0 0 16px 6px rgba(255,26,26,0.3); transition: box-shadow 0.15s; }
  .cursor.moving { box-shadow: 0 0 3px 1px #ff1a1a, 0 0 14px 6px rgba(255,26,26,0.95), 0 0 28px 12px rgba(255,26,26,0.55); }
  .label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--red); display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; }
  .label::before { content: ''; width: 28px; height: 1px; background: var(--red); display: block; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 10vw, 8rem); letter-spacing: 0.02em; line-height: 0.9; margin-bottom: 28px; }
  p { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; letter-spacing: 0.06em; color: #c8c4be; max-width: 500px; line-height: 1.7; margin-bottom: 48px; }
  a { font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; letter-spacing: 0.28em; text-transform: uppercase; background: var(--red); color: #080808; padding: 15px 42px; text-decoration: none; transition: background 0.2s; }
  a:hover { background: #b8962e; }
  @media (hover: none) and (pointer: coarse) { *, *::before, *::after { cursor: auto !important; } .cursor { display: none !important; } }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div>
  <div class="label">Transmission Received</div>
  <h1>WE'LL BE<br>IN TOUCH.</h1>
  <p>Your inquiry has been received and flagged for immediate review. A member of the Shadow team will contact you within 24 hours through secure channels.</p>
  <a href="index.html">Return to Shadow</a>
</div>
<script>
  const cursor = document.getElementById('cursor');
  let t;
  document.addEventListener('mousemove', e => {
    cursor.style.transform = `translate(${e.clientX - 3}px, ${e.clientY - 3}px)`;
    cursor.classList.add('moving');
    clearTimeout(t);
    t = setTimeout(() => cursor.classList.remove('moving'), 120);
  });
</script>
</body>
